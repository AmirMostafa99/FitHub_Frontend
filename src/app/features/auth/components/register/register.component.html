<div class="auth-shell">
  <header class="auth-nav">
    <a class="brand" routerLink="/">
      <div class="brand-mark">F</div>
      <span class="brand-name">FitHub</span>
    </a>
    <div class="nav-right">
      <span class="muted">Already have an account?</span>
      <a class="ghost" routerLink="/login">Log In</a>
    </div>
  </header>

  <main class="auth-main">
    <section class="card">
      <h1>Create Your Account</h1>
      <p class="muted">Join the ultimate fitness community.</p>

      <form class="form" (ngSubmit)="submit()">
        <label class="field">
          <span>Full Name</span>
          <input
            type="text"
            name="fullName"
            [(ngModel)]="fullName"
            placeholder="Enter your full name"
            required
          />
        </label>

        <label class="field">
          <span>Email Address</span>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="Enter your email address"
            required
          />
        </label>

        <label class="field">
          <span>Phone Number</span>
          <input
            type="tel"
            name="phone"
            [(ngModel)]="phone"
            placeholder="Enter your phone number"
          />
        </label>

        <label class="field">
          <span>City</span>
          <input type="text" name="city" [(ngModel)]="city" placeholder="Enter your city" />
        </label>

        <label class="field">
          <span>Password</span>
          <div class="input-with-icon">
            <input
              [type]="showPassword ? 'text' : 'password'"
              name="password"
              [(ngModel)]="password"
              placeholder="Create a password"
              required
              minlength="6"
            />
            <button
              type="button"
              class="icon-button"
              (click)="togglePassword()"
              aria-label="Toggle password visibility"
            >
              <svg *ngIf="!showPassword" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 5c-5 0-9.27 3.11-11 7 1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7Zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-3a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"
                />
              </svg>
              <svg *ngIf="showPassword" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M2.81 2.81 1.39 4.22 4.7 7.53A12.1 12.1 0 0 0 1 12c1.73 3.89 6 7 11 7 2.12 0 4.11-.5 5.86-1.38l1.92 1.92 1.41-1.41-18.38-18.4Zm8.95 8.95 2.48 2.48a2.99 2.99 0 0 1-2.48-2.48Zm-2.54-2.54 6.61 6.61A5 5 0 0 1 8.22 9.22Zm3.78-3.68c-1.05 0-2.05.17-2.98.47l1.62 1.62a3 3 0 0 1 3.69 3.69l2.11 2.11A10.3 10.3 0 0 0 21.01 12 10.3 10.3 0 0 0 12 5.54Z"
                />
              </svg>
            </button>
          </div>
        </label>

        <label class="field">
          <span>Confirm Password</span>
          <div class="input-with-icon">
            <input
              [type]="showConfirm ? 'text' : 'password'"
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              placeholder="Confirm your password"
              required
              minlength="6"
            />
            <button
              type="button"
              class="icon-button"
              (click)="toggleConfirm()"
              aria-label="Toggle confirm password visibility"
            >
              <svg *ngIf="!showConfirm" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 5c-5 0-9.27 3.11-11 7 1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7Zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-3a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"
                />
              </svg>
              <svg *ngIf="showConfirm" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M2.81 2.81 1.39 4.22 4.7 7.53A12.1 12.1 0 0 0 1 12c1.73 3.89 6 7 11 7 2.12 0 4.11-.5 5.86-1.38l1.92 1.92 1.41-1.41-18.38-18.4Zm8.95 8.95 2.48 2.48a2.99 2.99 0 0 1-2.48-2.48Zm-2.54-2.54 6.61 6.61A5 5 0 0 1 8.22 9.22Zm3.78-3.68c-1.05 0-2.05.17-2.98.47l1.62 1.62a3 3 0 0 1 3.69 3.69l2.11 2.11A10.3 10.3 0 0 0 21.01 12 10.3 10.3 0 0 0 12 5.54Z"
                />
              </svg>
            </button>
          </div>
        </label>

        <button class="primary" type="submit">Sign Up</button>
        <button class="secondary" type="button" routerLink="/business-signup">
          Create your business Account
        </button>
      </form>

      <p class="terms muted">By signing up, you agree to our <a href="#">Terms of Service</a>.</p>
    </section>
  </main>
</div>
