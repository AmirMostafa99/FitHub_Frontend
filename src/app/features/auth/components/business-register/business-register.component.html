<div class="auth-shell">
  <header class="auth-nav">
    <a class="brand" routerLink="/">
      <div class="brand-mark">F</div>
      <span class="brand-name">FitHub</span>
    </a>
    <div class="nav-right">
      <span class="muted">Already have an account?</span>
      <a class="ghost" routerLink="/login">Log In</a>
    </div>
  </header>

  <main class="auth-main">
    <section class="card">
      <h1>Create Your Business Account</h1>
      <p class="muted">
        Register your gym and start managing branches, staff, bookings, and earnings.
      </p>

      <form class="form" (ngSubmit)="submit()">
        <div class="grid">
          <label class="field">
            <span>Owner Name</span>
            <input type="text" name="name" [(ngModel)]="name" placeholder="John Doe" required />
          </label>
          <label class="field">
            <span>Email Address</span>
            <input
              type="email"
              name="email"
              [(ngModel)]="email"
              placeholder="you@example.com"
              required
            />
          </label>
        </div>

        <div class="grid">
          <label class="field">
            <span>Password</span>
            <div class="input-with-icon">
              <input
                [type]="showPassword ? 'text' : 'password'"
                name="password"
                [(ngModel)]="password"
                placeholder="Enter a password"
                required
                minlength="6"
              />
              <button
                type="button"
                class="icon-button"
                (click)="togglePassword()"
                aria-label="Toggle password visibility"
              >
                <svg *ngIf="!showPassword" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 5c-5 0-9.27 3.11-11 7 1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7Zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-3a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"
                  />
                </svg>
                <svg *ngIf="showPassword" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M2.81 2.81 1.39 4.22 4.7 7.53A12.1 12.1 0 0 0 1 12c1.73 3.89 6 7 11 7 2.12 0 4.11-.5 5.86-1.38l1.92 1.92 1.41-1.41-18.38-18.4Zm8.95 8.95 2.48 2.48a2.99 2.99 0 0 1-2.48-2.48Zm-2.54-2.54 6.61 6.61A5 5 0 0 1 8.22 9.22Zm3.78-3.68c-1.05 0-2.05.17-2.98.47l1.62 1.62a3 3 0 0 1 3.69 3.69l2.11 2.11A10.3 10.3 0 0 0 21.01 12 10.3 10.3 0 0 0 12 5.54Z"
                  />
                </svg>
              </button>
            </div>
          </label>
          <label class="field">
            <span>Confirm Password</span>
            <div class="input-with-icon">
              <input
                [type]="showConfirm ? 'text' : 'password'"
                name="confirmPassword"
                [(ngModel)]="confirmPassword"
                placeholder="Confirm password"
                required
                minlength="6"
              />
              <button
                type="button"
                class="icon-button"
                (click)="toggleConfirm()"
                aria-label="Toggle confirm password visibility"
              >
                <svg *ngIf="!showConfirm" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 5c-5 0-9.27 3.11-11 7 1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7Zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-3a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"
                  />
                </svg>
                <svg *ngIf="showConfirm" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M2.81 2.81 1.39 4.22 4.7 7.53A12.1 12.1 0 0 0 1 12c1.73 3.89 6 7 11 7 2.12 0 4.11-.5 5.86-1.38l1.92 1.92 1.41-1.41-18.38-18.4Zm8.95 8.95 2.48 2.48a2.99 2.99 0 0 1-2.48-2.48Zm-2.54-2.54 6.61 6.61A5 5 0 0 1 8.22 9.22Zm3.78-3.68c-1.05 0-2.05.17-2.98.47l1.62 1.62a3 3 0 0 1 3.69 3.69l2.11 2.11A10.3 10.3 0 0 0 21.01 12 10.3 10.3 0 0 0 12 5.54Z"
                  />
                </svg>
              </button>
            </div>
          </label>
        </div>

        <h3 class="subhead">Business Licensing / Documents</h3>
        <div class="grid">
          <label class="field">
            <span>Commercial Registration Number (CRN)</span>
            <input type="text" name="crn" [(ngModel)]="crn" placeholder="Enter CRN" />
          </label>
          <label class="field file-field">
            <span>Business License Upload</span>
            <div class="file-input">
              <input type="file" name="license" />
            </div>
          </label>
        </div>

        <label class="field file-field">
          <div class="flex between">
            <span>Ownership / Lease Contract <span class="muted">(Optional)</span></span>
          </div>
          <div class="file-input">
            <input type="file" name="lease" />
          </div>
        </label>

        <button class="primary" type="submit">Create Business Account</button>
        <button class="link-button" type="button" routerLink="/signup">Back to User Sign Up</button>
      </form>
    </section>
  </main>
</div>
